services:
  mysql:
    image: mysql:8.4
    container_name: softwarecup-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: softwarecup
      MYSQL_USER: softwarecup
      MYSQL_PASSWORD: softwarecup-dev
      MYSQL_ROOT_PASSWORD: softwarecup-root-dev
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - softwarecup_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-usoftwarecup", "-psoftwarecup-dev"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  softwarecup_mysql_data:
